name: Secret Scan (gitleaks)

# Report-only initial rollout — promote to blocking after a clean week.
# "Report-only" applies to findings (a detected secret never fails the job);
# scanner/report operational failures already fail the job (see run-gitleaks.sh).
# Owner: Head of Engineering. SOC2 Patch Management Policy reference.

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['main']
  schedule:
    - cron: '0 9 * * 1'  # Mondays 09:00 UTC weekly full-history scan
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  gitleaks:
    name: Scan for committed secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Range selection verifies event SHAs locally, and scheduled/manual
          # runs need every ref for full-history coverage.
          fetch-depth: 0

      - name: Select scan range
        id: range
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_AFTER_SHA: ${{ github.event.after }}
          PUSH_FORCED: ${{ github.event.forced }}
        run: scripts/ci/select-gitleaks-range.sh

      - name: Test scan range selection
        run: scripts/ci/select-gitleaks-range.test.sh

      - name: Run gitleaks
        id: scan
        # Pinned to gitleaks v8.30.1 from the org-owned GHCR namespace (ghcr.io/gitleaks/gitleaks) — strictly better trust posture than the personal-namespace DockerHub source the README also lists.
        # CLI invocation avoids the gitleaks-action license requirement that
        # silently no-ops on org-owned private repos. Findings remain
        # report-only, but scanner/report failures fail the job.
        env:
          SCAN_MODE: ${{ steps.range.outputs.mode }}
          COMMIT_RANGE: ${{ steps.range.outputs.commit_range }}
        run: scripts/ci/run-gitleaks.sh

      - name: Upload SARIF (findings remain report-only)
        # The runner maps a valid findings report to success. Operational
        # failures remain failed and must never upload a clean-looking report.
        if: always() && steps.scan.outcome == 'success'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-report.sarif
        continue-on-error: true  # uploading SARIF fails on repos without code-scanning enabled; non-blocking
